// ============================================================
// AMXX 中文本地化覆盖（由 entrypoint 在 amxx.cfg 之后执行）
// ============================================================

// 服务器默认语言：简体中文
amx_language "cn"

// 0 = 强制所有玩家使用服务器语言（中文）
amx_client_languages 0

// 进入时是否提示语言相关消息
amx_language_display_msg 0

// 滚动欢迎语（底部滚动条）
amx_scrollmsg "欢迎来到 %hostname% —— 公平竞技 · 文明游戏 · 禁止作弊" 600

// 屏幕中央彩色提示
amx_imessage "欢迎来到 %hostname%" "000255100"
amx_imessage "本服已启用中文提示与管理菜单\n文明游戏，禁止作弊" "000100255"
amx_freq_imessage 180

// 管理员活动提示：对所有人显示（含管理员名）
amx_show_activity 2
