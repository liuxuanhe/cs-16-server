// ============================================================
// CS 1.6 服务器主配置（可由 entrypoint 根据环境变量覆盖部分项）
// ============================================================

hostname "CS 1.6 Server"
rcon_password "changeme"

// 进服密码：留空表示公开；设置后需要密码才能加入
sv_password ""

// 网络与性能
sv_lan 0
sv_region 4
sys_ticrate 100
sv_maxrate 100000
sv_minrate 5000
sv_maxupdaterate 102
sv_minupdaterate 30
fps_max 300

// 语音
sv_voiceenable 1
sv_alltalk 0

// 作弊与日志
sv_cheats 0
sv_aim 0
log on
mp_logmessages 1
mp_logfile 1

// 回合与金钱
mp_timelimit 30
mp_maxrounds 0
mp_winlimit 0
mp_freezetime 3
mp_roundtime 2.5
mp_buytime 0.25
mp_c4timer 45
mp_friendlyfire 0
mp_autoteambalance 0
mp_limitteams 0
mp_startmoney 800
mp_tkpunish 0
mp_forcecamera 0
mp_forcechasecam 0
mp_flashlight 1
mp_footsteps 1

// 允许下载自定义内容（地图/资源）
sv_allowdownload 1
sv_allowupload 1

// 进服介绍（MOTD）：对应 cstrike/server_info.html
motdfile "server_info.html"

// 执行封禁列表
exec listip.cfg
exec banned.cfg

echo "[server.cfg] 配置已加载"
