; ============================================================
; AMX Mod X 管理员列表
; 位置：cstrike/addons/amxmodx/configs/users.ini
;
; 本文件可由 entrypoint 根据环境变量自动重写：
;   ADMIN_NAME / ADMIN_PASSWORD / ADMIN_STEAMID
; 若设置了上述环境变量，容器启动时会覆盖本文件中的自动生成段。
; 你也可以在本文件末尾手动追加额外管理员（保留你的手写行）。
;
; 权限字母说明（Access flags）：
;   a 免疫  b 预留位  c 踢人  d 永久封禁  e 处死/掌掴
;   f 换图  g 改 cvar  h 执行 cfg  i 聊天指令  j 投票
;   k 服密码  l RCON  u 菜单
;   常用满权：abcdefghijklmnopqrstu
;
; 账号类型（Account flags）：
;   a 密码错误则踢出
;   c SteamID / WONID
;   e 不检查密码（仅校验名字/IP/SteamID）
;   k 名字区分大小写
;
; 名字+密码登录示例（进服后控制台：setinfo _pw "你的密码"）：
;   "玩家名" "密码" "abcdefghijklmnopqrstu" ""
; 说明：第四段不要写 "a"，否则密码错误/未设置会被直接踢出服务器。
;
; SteamID 登录示例（无需密码）：
;   "STEAM_0:1:12345678" "" "abcdefghijklmnopqrstu" "ce"
; ============================================================

; --- 以下由 entrypoint 根据环境变量维护，请勿依赖手改此段 ---
; AUTO_ADMIN_BEGIN
; AUTO_ADMIN_END
