# CS 1.6 服务器 Docker Compose
# 使用：docker-compose up -d --build
# 停止：docker-compose down
version: "3"

services:
  cs16:
    build: .
    image: cs16-server:latest
    container_name: cs16-server
    restart: unless-stopped
    # Docker 19.x + Ubuntu 22.04：默认 seccomp 会让 test -x / hlds_run 误判失败
    security_opt:
      - seccomp:unconfined
    shm_size: "1gb"
    ports:
      # CS 1.6 主要使用 UDP；TCP 一并映射便于部分客户端/工具
      - "27015:27015/udp"
      - "27015:27015/tcp"
    environment:
      SERVER_NAME: "XuanHe's CS1.6 服务器"
      # H 键「服务器设置」/ 控制台 rcon 使用这个密码（不是进服密码）
      RCON_PASSWORD: "36184416"
      # 进服密码：加入服务器时用；留空=公开。不能用于 H 键 RCON
      SERVER_PASSWORD: "2026"
      START_MAP: "cs_assault"
      MAXPLAYERS: "16"
      TICKRATE: "100"
      # 初始金钱（CS 1.6 上限一般为 16000）
      START_MONEY: "16000"
      # 机器人：0=关闭，1=启用
      ENABLE_BOTS: "1"
      BOT_QUOTA: "8"
      BOT_JOIN_TEAM: "any"
      # 机器人名字前缀（YaPB 会自动加空格），例如 [XuanHe] PlayerName
      BOT_NAME_PREFIX: "[XuanHe]"
      # 机器人难度：0简单 / 1普通 / 2中等 / 3困难 / 4变态（也可用 easy/hard 等）
      BOT_DIFFICULTY: "0"
      # AMXX 管理员（游戏内 amxmodmenu）
      # 名字+密码：须在进服前 setinfo _pw，再 connect
      ADMIN_NAME: "XuanHe"
      ADMIN_PASSWORD: "36184416"
      ADMIN_FLAGS: "abcdefghijklmnopqrstu"
    volumes:
      # 自定义地图：把 .bsp 等放到 ./maps/
      - ./maps:/opt/steam/custom_maps:ro
      # 热更新 MOTD / 中文提示 / users.ini 模板（改完重建容器即可，无需 rebuild 镜像）
      - ./config:/opt/steam/config_src:ro
